<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Web Pages - Starter Template</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .task-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .task-card:hover {
            transform: translateY(-5px);
        }

        .task-card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        /* Task 1: Todo List Styles */
        #todoInput {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        #addTaskBtn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        #addTaskBtn:hover {
            background: #764ba2;
        }

        #taskList {
            list-style: none;
            margin-top: 15px;
        }

        #taskList li {
            background: #f5f5f5;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .deleteBtn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .deleteBtn:hover {
            background: #ff5252;
        }

        #taskCount {
            text-align: center;
            margin-top: 10px;
            color: #667eea;
            font-weight: bold;
        }

        /* Task 2: Form Validator Styles */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input.valid {
            border-color: #51cf66;
        }

        .form-group input.invalid {
            border-color: #ff6b6b;
        }

        .validation-message {
            font-size: 0.85em;
            margin-top: 5px;
            height: 20px;
        }

        .validation-message.error {
            color: #ff6b6b;
        }

        .validation-message.success {
            color: #51cf66;
        }

        #submitBtn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        #submitBtn:hover {
            background: #764ba2;
        }

        /* Task 3: Counter Styles */
        #counterDisplay {
            text-align: center;
            font-size: 4em;
            font-weight: bold;
            margin: 30px 0;
            padding: 20px;
            border-radius: 10px;
            background: #f5f5f5;
            transition: all 0.3s ease;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .counter-btn {
            padding: 15px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #incrementBtn {
            background: #51cf66;
            color: white;
        }

        #incrementBtn:hover {
            background: #40c057;
        }

        #decrementBtn {
            background: #ff6b6b;
            color: white;
        }

        #decrementBtn:hover {
            background: #ff5252;
        }

        #resetBtn {
            background: #999;
            color: white;
        }

        #resetBtn:hover {
            background: #777;
        }

        .counter-neutral {
            color: #333;
        }

        .counter-positive {
            color: #51cf66;
        }

        .counter-negative {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Interactive Web Pages</h1>

        <div class="tasks-grid">
            <!-- Task 1: Todo List -->
            <div class="task-card">
                <h2>📝 Task 1: Todo List</h2>
                <input type="text" id="todoInput" placeholder="Enter a new task...">
                <button id="addTaskBtn">Add Task</button>
                <ul id="taskList"></ul>
                <div id="taskCount">Tasks: 0</div>
            </div>

            <!-- Task 2: Form Validator -->
            <div class="task-card">
                <h2>✅ Task 2: Form Validator</h2>
                <form id="validationForm">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" placeholder="your@email.com">
                        <div class="validation-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" placeholder="Min 8 characters">
                        <div class="validation-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password:</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password">
                        <div class="validation-message"></div>
                    </div>
                    <button type="submit" id="submitBtn">Submit</button>
                </form>
            </div>

            <!-- Task 3: Counter -->
            <div class="task-card">
                <h2>🔢 Task 3: Counter</h2>
                <div id="counterDisplay" class="counter-neutral">0</div>
                <div class="button-group">
                    <button id="decrementBtn" class="counter-btn">➖ Decrement</button>
                    <button id="resetBtn" class="counter-btn">🔄 Reset</button>
                    <button id="incrementBtn" class="counter-btn">➕ Increment</button>
                </div>
            </div>
        </div>
    </div>

    <script src="starter-code.js"></script>
</body>
</html>
